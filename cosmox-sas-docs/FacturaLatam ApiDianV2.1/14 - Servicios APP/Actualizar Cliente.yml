info:
  name: Actualizar Cliente
  type: http
  seq: 4

http:
  method: PUT
  url: "{{url_base}}/customers/2222222222"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: "{\r

      \    \"dv\": \"5\",\r

      \    \"name\": \"cliente por defecto\",\r

      \    \"phone\": \"52543456\",\r

      \    \"address\": \"calle 42 a 83 b 09\",\r

      \    \"email\": \"clientepordefecto@gmail.com\"\r

      }"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: "200"
    request:
      url: "{{url_base}}/customers/2222222222"
