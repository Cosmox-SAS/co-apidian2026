      body:
        type: json
        data: "{\r

          \    \"dv\": \"5\",\r

          \    \"name\": \"cliente por defecto\",\r

          \    \"phone\": \"52543456\",\r

          \    \"address\": \"calle 42 a 83 b 09\",\r

          \    \"email\": \"clientepordefecto@gmail.com\"\r

          }"
    response:
      status: 200
      statusText: OK
      headers:
        - name: "0"
