info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{url_base}}/login"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: "{\r

      \    \"email\": \"demo@gmail.com\",\r

      \    \"password\": \"12345678\"\r

      }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

