info:
  name: Lista Resoluciones
  type: http
  seq: 5

http:
  method: GET
  url: "{{url_base}}/table/resolutions/{{nit}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

