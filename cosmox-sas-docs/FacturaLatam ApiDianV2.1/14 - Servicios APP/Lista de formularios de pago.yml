info:
  name: Lista de formularios de pago
  type: http
  seq: 7

http:
  method: GET
  url: "{{url_base}}/table/payment-forms"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{url_base}}/table/payment-forms"
      method: GET
      headers:
        - name: Content-Type
          value: application/json
        - name: Accept
          value: application/json
    response:
      status: 200
      statusText: OK
      headers:
        - name: "0"
          value: Allow
        - name: "1"
          value: POST, GET, OPTIONS, PUT, PATCH, DELETE
        - name: Date
          value: Wed, 15 Jan 2025 14:20:50 GMT
        - name: Server
          value: Apache/2.4.35 (Win64) OpenSSL/1.1.1k PHP/7.4.19
        - name: Vary
          value: Authorization
        - name: X-Powered-By
          value: PHP/7.4.19
        - name: Cache-Control
          value: no-cache, private
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Allow-Methods
          value: POST, GET, OPTIONS, PUT, PATCH, DELETE
        - name: Access-Control-Allow-Headers
          value: Access-Control-Allow-Headers, Origin,Accept, X-Requested-With, Content-Type, Access-Control-Request-Method, Authorization, Access-Control-Request-Headers
        - name: Keep-Alive
          value: timeout=5, max=100
        - name: Connection
          value: Keep-Alive
        - name: Transfer-Encoding
          value: chunked
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
              "payment_forms": [
                  {
                      "id": 1,
                      "name": "Contado",
                      "code": "1\r",
                      "created_at": "2023-02-26 14:28:28",
                      "updated_at": "2023-02-26 14:28:28",
                      "payment_method_code": null,
                      "payment_due_date": null,
                      "duration_measure": null,
                      "duration_measure_unit_code": "DAY",
                      "payment_id": 1
                  },
                  {
                      "id": 2,
                      "name": "Crédito",
                      "code": "2\r",
                      "created_at": "2023-02-26 14:28:28",
                      "updated_at": "2023-02-26 14:28:28",
                      "payment_method_code": null,
                      "payment_due_date": null,
                      "duration_measure": null,
                      "duration_measure_unit_code": "DAY",
                      "payment_id": 1
                  }
              ]
          }

docs: Permite listar los documentos y filtrar por fecha utilizando la clave date y los valores all, current_month, last_month, last_ninety, mientras que search es capaz de buscar por numero, prefijo, total, fecha especifica y algunos datos principales del cliente como nombre, correo, telefono o numero de documento, tambien cuenta con el sistema paginacion utilizando la clave page.
