  content: |-
    Servicios que conectan con apirips-docker (API externa)

    ### Requisitos

    - URL de apirips-docker (API externa que debe ser desplegada si no posee una URL)
        
    - credenciales de usuario de sector salud
        
    - Nit de empresa
        

    ### Manuales

