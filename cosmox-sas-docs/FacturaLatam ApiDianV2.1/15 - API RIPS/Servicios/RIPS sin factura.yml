docs: |-
  RIPS sin factura  

  - el json es similar a un RIPS con factura pero el acmpo "xmlFevFile" debe quedar **null**
      
  - debe utilizar RS en el campo TipoNota haciendo referencia al documento no electrónico y su numeración (numNota)
