info:
  name: RIPS Capita incial
  type: http
  seq: 6

http:
  method: POST
  url: "{{url_apirips}}/api/PaquetesFevRips/CargarCapitaInicial"
  body:
    type: json
    data: "{\r

      \    \"rips\": null,\r

      \    // JSON API: 09-otros tipos de facturas / Sector Salud / Health SS-recaudo | Capita inicial\r

      \    \"xmlFevFile\": \"\"\r

      }"
  auth:
    type: bearer
    token: "{{token_apirips}}"

settings:
