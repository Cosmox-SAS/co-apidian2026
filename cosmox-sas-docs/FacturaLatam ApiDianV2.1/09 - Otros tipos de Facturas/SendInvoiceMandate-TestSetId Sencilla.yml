docs: |-
  ENVIO DE FACTURA MANDATO

  - Aplica la misma documentacion que el PRIMER ENVIO DE FACTURA de la seccion 02 - PRIMEROS ENVIOS.

  - Este ejemplo ilustra como se debe utilizar la API para enviar una factura tipo MANDATO, este tipo de facturas se utiliza mucho en inmobiliarias, donde el valor del arrendamiento de un bien se recibe a nombre de un tercero, este tercero se especifica en los campos agentpary y agentparty_dv.
