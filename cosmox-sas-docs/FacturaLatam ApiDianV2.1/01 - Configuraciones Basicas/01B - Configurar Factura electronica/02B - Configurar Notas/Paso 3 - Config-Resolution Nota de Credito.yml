info:
  name: Paso 3 - Config-Resolution Nota de Credito
  type: http
  seq: 1

http:
  method: PUT
  url: "{{url_base}}/ubl2.1/config/resolution"
  headers:
    - name: Content-Type
      value: application/json
    - name: accept
      value: application/json
  body:
    type: json
    data: "{\r

      \t\"type_document_id\": 4,\r

      \t\"from\": 1,\r

      \t\"to\": 99999999,\r

      \t\"prefix\": \"NC\",\r

      \    \"resolution\": \"4\" //numero libre para administrar las notas de credito\r

      }\r\n"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

