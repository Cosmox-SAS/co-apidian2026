      \    \"payment_due_date\": \"2025-07-22\", // Fecha de vencimiento (igual a emisión si es contado)\r

      \    \"duration_measure\": \"0\" // Días de plazo \r

      \  },\r

      \r

      \  \"allowance_charges\": [\r

      \    {\r

      \      \"discount_id\": 1,\r

      \      \"charge_indicator\": false, // false = es descuento, true = es recargo\r

      \      \"allowance_charge_reason\": \"Descuento Global\",\r

      \      \"amount\": \"100.00\", // Descuento global aplicado sobre el total\r

      \      \"base_amount\": \"1900.00\" // Base sobre la cual se calculó el descuento\r

      \    }\r

      \  ],\r

      \r

      \  \"legal_monetary_totals\": {\r

      \    \"line_extension_amount\": \"1900.00\", // Subtotal (suma de líneas con descuentos de línea aplicados)\r

      \    \"tax_exclusive_amount\": \"1900.00\", // Total sin IVA (antes del IVA, pero después de descuentos por línea)\r

      \    \"tax_inclusive_amount\": \"2261.00\", // Total con IVA incluido (1900 + 361 IVA)\r

      \    \"allowance_total_amount\": \"100.00\", // Descuento total informado en la sección global\r

      \    \"charge_total_amount\": \"0.00\", // Total de recargos (en este caso, ninguno)\r

      \    \"payable_amount\": \"2161.00\" // Total a pagar: 2261.00 - 100.00 (descuento global)\r

      \  },\r

      \r

      \  \"tax_totals\": [\r

      \    {\r

      \      \"tax_id\": 1, // 1 = IVA\r

      \      \"tax_amount\": \"361.00\", // IVA total sumando ambas líneas (180.50 + 180.50)\r

      \      \"percent\": \"19.00\", // Porcentaje de IVA\r

      \      \"taxable_amount\": \"1900.00\" // Base gravable total (suma de 950 + 950)\r

      \    }\r

      \  ],\r

      \r

      \  \"invoice_lines\": [\r

      \    {\r

      \      \"unit_measure_id\": 70, // Unidad de medida\r

      \      \"invoiced_quantity\": \"1\", // Cantidad facturada\r

      \      \"line_extension_amount\": \"950.00\", // Precio - descuento de línea (1000 - 50)\r

      \      \"free_of_charge_indicator\": false, // No es gratuito\r

      \      \"description\": \"Producto de prueba 1\",\r

      \      \"code\": \"PRUEBA1\",\r

      \      \"type_item_identification_id\": 4, // Código del tipo de ítem\r

      \      \"price_amount\": \"1000.00\", // Precio original antes de descuento\r

      \      \"base_quantity\": \"1\",\r

      \r

      \      \"allowance_charges\": [\r

      \        {\r

      \          \"discount_id\": 10,\r

      \          \"charge_indicator\": false,\r

      \          \"allowance_charge_reason\": \"Descuento por promoción\",\r

      \          \"amount\": \"50.00\", // Descuento de la línea\r

      \          \"base_amount\": \"1000.00\"\r

      \        }\r

      \      ],\r

      \r

      \      \"tax_totals\": [\r

      \        {\r

      \          \"tax_id\": 1,\r

      \          \"tax_amount\": \"180.50\", // IVA de esta línea: 950 x 0.19\r

      \          \"taxable_amount\": \"950.00\", // Base gravable después del descuento de línea\r

      \          \"percent\": \"19.00\"\r

      \        }\r

      \      ]\r

      \    },\r

      \r

      \    {\r

      \      \"unit_measure_id\": 70,\r

      \      \"invoiced_quantity\": \"1\",\r

      \      \"line_extension_amount\": \"950.00\", // 1000 - 50\r

      \      \"free_of_charge_indicator\": false,\r

      \      \"description\": \"Producto de prueba 2\",\r

      \      \"code\": \"PRUEBA2\",\r

      \      \"type_item_identification_id\": 4,\r

      \      \"price_amount\": \"1000.00\",\r

      \      \"base_quantity\": \"1\",\r

      \r

      \      \"allowance_charges\": [\r

      \        {\r

      \          \"discount_id\": 11,\r

      \          \"charge_indicator\": false,\r

      \          \"allowance_charge_reason\": \"Descuento por volumen\",\r

      \          \"amount\": \"50.00\",\r

      \          \"base_amount\": \"1000.00\"\r

      \        }\r

      \      ],\r

      \r

      \      \"tax_totals\": [\r

      \        {\r

      \          \"tax_id\": 1,\r

      \          \"tax_amount\": \"180.50\", // 950 x 0.19\r

      \          \"taxable_amount\": \"950.00\",\r

      \          \"percent\": \"19.00\"\r

      \        }\r

      \      ]\r

      \    }\r

      \  ]\r

      }\r\n"
